<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dynamic Codes - In Arrivo</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0f172a, #1e293b); /* Sfondo blu scuro tecnologico */
            color: #e2e8f0;
            overflow: hidden;
            position: relative;
        }

        canvas {
            position: absolute;
            top: 0; left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none; /* Permette click sotto il canvas */
        }

        .container {
            position: relative;
            z-index: 2;
            text-align: center;
            max-width: 90%;
            width: 680px;
            margin: 0 auto;
            padding: 60px 20px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: rgba(15, 23, 42, 0.65);
            backdrop-filter: blur(8px);
            border-radius: 20px;
            box-shadow: 0 0 40px rgba(59, 130, 246, 0.18);
        }

        #logo {
            max-width: 280px;
            margin-bottom: 32px;
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(59, 130, 246, 0.3);
        }

        h1 {
            font-size: 2.8em;
            margin: 0 0 0.6em;
            color: #dbeafe;
            letter-spacing: 1px;
        }

        p {
            font-size: 1.25em;
            color: #cbd5e1;
            line-height: 1.7;
            max-width: 640px;
        }

        .contact-links {
            margin-top: 40px;
            display: flex;
            align-items: center;
            gap: 32px;
        }

        .contact-links a {
            color: #60a5fa;
            text-decoration: none;
            font-size: 1.15em;
            transition: all 0.3s ease;
        }

        .contact-links a:hover {
            color: #dbeafe;
            transform: translateY(-2px);
        }

        #linkedin-logo {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            transition: all 0.3s ease;
        }

        #linkedin-logo:hover {
            transform: scale(1.15);
            box-shadow: 0 0 20px rgba(59, 130, 246, 0.6);
        }
    </style>
</head>
<body>
    <canvas id="neuralCanvas"></canvas>

    <div class="container">
        <img src="https://raw.githubusercontent.com/toniocarnialman/dynamiccodes.it/main/logo.png" alt="Logo Dynamic Codes" id="logo">
        
        <h1>Stiamo Costruendo il Futuro del Tuo Business</h1>
        
        <p>La nostra piattaforma è quasi pronta per rivoluzionare il modo in cui la tua azienda cresce. Stiamo mettendo a punto gli ultimi dettagli per offrirti un servizio innovativo, intuitivo e potente.</p>

        <div class="contact-links">
            <a href="mailto:cardinale.antonio85@gmail.com">Contattaci per maggiori info</a>
            <a href="https://www.linkedin.com/company/dynamiccodes" target="_blank" rel="noopener noreferrer">
                <img src="https://upload.wikimedia.org/wikipedia/commons/c/ca/LinkedIn_logo_initials.png" alt="Pagina LinkedIn" id="linkedin-logo">
            </a>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('neuralCanvas');
        const ctx = canvas.getContext('2d');

        let width, height;
        let mouse = { x: 0, y: 0, down: false };

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }

        window.addEventListener('resize', resize);
        resize();

        // Mouse events
        window.addEventListener('mousemove', e => {
            mouse.x = e.clientX;
            mouse.y = e.clientY;
        });

        window.addEventListener('touchmove', e => {
            if (e.touches.length > 0) {
                mouse.x = e.touches[0].clientX;
                mouse.y = e.touches[0].clientY;
            }
        }, { passive: true });

        // Particelle / nodi neurali
        class Node {
            constructor() {
                this.x = Math.random() * width;
                this.y = Math.random() * height;
                this.vx = (Math.random() - 0.5) * 0.6;
                this.vy = (Math.random() - 0.5) * 0.6;
                this.size = Math.random() * 3 + 1.5;
                this.hue = 200 + Math.random() * 40; // blu-azzurro
            }

            update() {
                // Leggero movimento base
                this.x += this.vx;
                this.y += this.vy;

                // Rimbalzo bordi
                if (this.x < 0 || this.x > width) this.vx *= -1;
                if (this.y < 0 || this.y > height) this.vy *= -1;

                // Attrazione lieve verso mouse (effetto neuroni che reagiscono)
                const dx = mouse.x - this.x;
                const dy = mouse.y - this.y;
                const dist = Math.sqrt(dx*dx + dy*dy);
                
                if (dist < 220) {
                    const force = (220 - dist) / 220 * 0.4;
                    this.x += dx * force * 0.014;
                    this.y += dy * force * 0.014;
                }
            }
        }

        const nodes = [];
        const nodeCount = Math.min( Math.floor(width * height / 9000), 180 ); // ~120-180 nodi

        for (let i = 0; i < nodeCount; i++) {
            nodes.push(new Node());
        }

        function animate() {
            ctx.fillStyle = 'rgba(15, 23, 42, 0.08)'; // leggero trail
            ctx.fillRect(0, 0, width, height);

            // Disegna connessioni
            for (let i = 0; i < nodes.length; i++) {
                const n1 = nodes[i];
                n1.update();

                for (let j = i+1; j < nodes.length; j++) {
                    const n2 = nodes[j];
                    const dx = n1.x - n2.x;
                    const dy = n1.y - n2.y;
                    const dist = Math.sqrt(dx*dx + dy*dy);

                    if (dist < 140) {
                        const alpha = (140 - dist) / 140;
                        ctx.beginPath();
                        ctx.moveTo(n1.x, n1.y);
                        ctx.lineTo(n2.x, n2.y);
                        ctx.strokeStyle = `hsla(${n1.hue}, 80%, 70%, ${alpha * 0.25})`;
                        ctx.lineWidth = alpha * 1.6;
                        ctx.stroke();
                    }
                }
            }

            // Disegna nodi
            for (const node of nodes) {
                ctx.beginPath();
                ctx.arc(node.x, node.y, node.size, 0, Math.PI * 2);
                ctx.fillStyle = `hsla(${node.hue}, 90%, 75%, 0.9)`;
                ctx.shadowColor = `hsla(${node.hue}, 100%, 70%, 0.7)`;
                ctx.shadowBlur = 12;
                ctx.fill();
                ctx.shadowBlur = 0;
            }

            requestAnimationFrame(animate);
        }

        animate();
    </script>
</body>
</html>
