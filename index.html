<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dynamic Codes - In Arrivo</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden; /* Importantissimo */
        }

        /* Contenitore per lo sfondo di particelle */
        #particles-js {
            position: absolute;
            width: 100%;
            height: 100%;
            background-color: #121212;
            z-index: 1; /* Mette lo sfondo dietro al contenuto */
        }

        /* Contenuto principale, centrato sopra lo sfondo */
        .content-container {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100%;
            width: 100%;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 2; /* Mette il contenuto davanti */
        }

        .inner-box {
            text-align: center;
            background: rgba(26, 26, 26, 0.9);
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 0 25px rgba(0, 170, 255, 0.2);
            max-width: 90%;
            width: 600px;
        }
        
        #logo {
            max-width: 250px;
            margin-bottom: 20px;
        }

        h1 {
            font-size: 2.5em;
            margin-bottom: 0.5em;
            color: #ffffff;
        }

        p {
            font-size: 1.2em;
            color: #cccccc;
            line-height: 1.6;
        }

        .contact-links {
            margin-top: 30px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 25px;
        }

        .contact-links a {
            color: #00aaff;
            text-decoration: none;
            font-size: 1.1em;
            transition: color 0.3s ease;
        }

        .contact-links a:hover {
            color: #ffffff;
        }

        #linkedin-logo {
            width: 30px;
            height: 30px;
            vertical-align: middle;
            transition: transform 0.3s ease;
        }

        #linkedin-logo:hover {
            transform: scale(1.1);
        }
    </style>
</head>
<body>

    <!-- 1. Il contenitore per il nostro sfondo dinamico -->
    <div id="particles-js"></div>

    <!-- Il tuo contenuto, ora separato dallo sfondo -->
    <div class="content-container">
        <div class="inner-box">
            <img src="https://raw.githubusercontent.com/toniocarnialman/dynamiccodes.it/main/dc_logo.png" alt="Logo Dynamic Codes" id="logo">
            <h1>Stiamo Costruendo il Futuro del Tuo Business</h1>
            <p>La nostra piattaforma è quasi pronta per rivoluzionare il modo in cui la tua azienda cresce. Stiamo mettendo a punto gli ultimi dettagli per offrirti un servizio senza precedenti.</p>
            <div class="contact-links">
                <a href="mailto:cardinale.antonio85@gmail.com">Contattaci per maggiori info</a>
                <a href="https://www.linkedin.com/company/dynamiccodes" target="_blank" rel="noopener noreferrer">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/c/ca/LinkedIn_logo_initials.png" alt="Pagina LinkedIn" id="linkedin-logo">
                </a>
            </div>
        </div>
    </div>

    <!-- 2. Includiamo la libreria particles.js -->
    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>

    <!-- 3. Lo script che attiva l'animazione -->
    <script>
        particlesJS('particles-js', {
            "particles": {
                "number": {
                    "value": 80, // Numero di particelle
                    "density": { "enable": true, "value_area": 800 }
                },
                "color": { "value": "#888888" }, // Colore delle particelle
                "shape": { "type": "circle" },
                "opacity": {
                    "value": 0.5,
                    "random": false,
                    "anim": { "enable": false }
                },
                "size": {
                    "value": 3, // Dimensione delle particelle
                    "random": true,
                    "anim": { "enable": false }
                },
                "line_linked": {
                    "enable": true,
                    "distance": 150, // Distanza per il collegamento
                    "color": "#888888", // Colore dei collegamenti
                    "opacity": 0.4,
                    "width": 1
                },
                "move": {
                    "enable": true,
                    "speed": 2, // Velocità di movimento
                    "direction": "none",
                    "random": false,
                    "straight": false,
                    "out_mode": "out",
                    "bounce": false
                }
            },
            "interactivity": {
                "detect_on": "canvas",
                "events": {
                    "onhover": {
                        "enable": true,
                        "mode": "repulse" // Respinge le particelle al passaggio del mouse
                    },
                    "onclick": {
                        "enable": true,
                        "mode": "push" // Aggiunge particelle al click
                    },
                    "resize": true
                },
                "modes": {
                    "repulse": { "distance": 100, "duration": 0.4 },
                    "push": { "particles_nb": 4 }
                }
            },
            "retina_detect": true
        });
    </script>

</body>
</html>
